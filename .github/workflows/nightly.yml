name: Nightly

on:
  schedule:
    # 03:00 UTC every day
    - cron: "0 0 1 * *"
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  nightly:
    name: Nightly (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-nightly-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-nightly-cargo-

      # ── Linux dependencies ──────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake g++ pkg-config \
            libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev libsecret-1-dev

      # ── macOS dependencies ──────────────────────────────────
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake

      # ── Build & test with nightly ───────────────────────────
      - name: Build workspace
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace --release

      - name: Clippy (nightly)
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true
