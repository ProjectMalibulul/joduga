name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # System dependencies
      # -------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake g++ \
            libasound2-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev libssl-dev \
            libsecret-1-dev patchelf

      # -------------------------
      # Node (Frontend)
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: tauri-ui/package-lock.json

      - name: Install frontend deps
        working-directory: tauri-ui
        run: npm ci

      - name: Build frontend
        working-directory: tauri-ui
        run: npm run build

      # -------------------------
      # Rust Toolchain
      # -------------------------
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI
        run: cargo install --force tauri-cli

      # -------------------------
      # Build C++ Engine (optional explicit step)
      # -------------------------
      - name: Build C++ engine
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)

      # -------------------------
      # Build Tauri App
      # -------------------------
      - name: Build Tauri bundle
        working-directory: tauri-ui
        run: cargo tauri build --release

      # -------------------------
      # Run Rust tests
      # -------------------------
      - name: Run Rust tests
        run: cargo test --workspace --release
