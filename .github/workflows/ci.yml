name: CI

on:
  push:
    branches: [test/cd]
  pull_request:
    branches: [test/cd]

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # System Dependencies
      # -------------------------
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            g++ \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsecret-1-dev \
            patchelf

      # -------------------------
      # Node Setup
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: tauri-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: tauri-ui
        run: npm ci

      # Do NOT manually run npm build here.
      # cargo tauri build will run beforeBuildCommand automatically.

      # -------------------------
      # Rust Setup
      # -------------------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # -------------------------
      # Build & Stage C++ Audio Engine
      # -------------------------
      - name: Build and stage C++ audio engine
        run: |
          cmake -S . -B cmake-build -DCMAKE_BUILD_TYPE=Release
          cmake --build cmake-build -j$(nproc)
          mkdir -p tauri-ui/external_libs
          # Copy the real .so file (with soversion) for Tauri resource bundling
          cp -a cmake-build/libjoduga_audio.so.0* tauri-ui/external_libs/ 2>/dev/null || true
          # Ensure the exact filename Tauri expects exists
          if [ ! -f tauri-ui/external_libs/libjoduga_audio.so.0 ]; then
            cp cmake-build/libjoduga_audio.so tauri-ui/external_libs/libjoduga_audio.so.0
          fi
          ls -la tauri-ui/external_libs/

      # -------------------------
      # Build Tauri App
      # -------------------------
      - name: Build Tauri (release)
        working-directory: tauri-ui
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/cmake-build:${{ github.workspace }}/tauri-ui/external_libs
        run: npm run tauri build

      # -------------------------
      # Run Rust tests
      # -------------------------
      - name: Run Rust tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/cmake-build:${{ github.workspace }}/tauri-ui/external_libs
        run: cargo test --workspace --release

      # -------------------------
      # Upload Debian Package
      # -------------------------
      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: joduga-linux-deb
          path: target/release/bundle/deb/*.deb
