name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # System Dependencies
      # -------------------------
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            g++ \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsecret-1-dev

      # -------------------------
      # Node Setup
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: tauri-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: tauri-ui
        run: npm ci

      # -------------------------
      # Rust Setup
      # -------------------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-

      # -------------------------
      # Build Tauri App (C++ is built automatically via cmake crate)
      # -------------------------
      - name: Build Tauri (release)
        working-directory: tauri-ui
        run: npm run tauri build

      # -------------------------
      # Run Rust tests
      # -------------------------
      - name: Run Rust tests
        run: cargo test --workspace --release

      # -------------------------
      # Verify static linking
      # -------------------------
      - name: Verify no dynamic dependency on libjoduga_audio
        run: |
          if ldd target/release/joduga-tauri | grep -q libjoduga_audio; then
            echo "ERROR: binary still dynamically links libjoduga_audio"
            exit 1
          fi
          echo "OK: libjoduga_audio is statically linked"

      # -------------------------
      # Upload build artifacts
      # -------------------------
      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: joduga-linux-deb
          path: target/release/bundle/deb/*.deb

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: joduga-linux-rpm
          path: target/release/bundle/rpm/*.rpm

  # -------------------------
  # Create GitHub Release
  # -------------------------
  release:
    needs: [build-linux]
    runs-on: ubuntu-24.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/joduga-linux-deb/*.deb
            artifacts/joduga-linux-rpm/*.rpm
