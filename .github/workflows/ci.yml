name: CI

on:
  push:
    branches: [main, test/cd, debug/core]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint & Format (runs once, fast gate)
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: lint-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: lint-cargo-registry-

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake g++ pkg-config \
            libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev libsecret-1-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ─────────────────────────────────────────────────────────────
  # Cross-platform build + test matrix
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-24.04
            rust: stable
            cmake_generator: Unix Makefiles
          - os: macos-latest
            rust: stable
            cmake_generator: Unix Makefiles
          - os: windows-latest
            rust: stable
            cmake_generator: Visual Studio 17 2022

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Linux dependencies ──────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake g++ pkg-config \
            libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev libsecret-1-dev

      # ── macOS dependencies ──────────────────────────────────
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake

      # ── Node.js for Tauri frontend ─────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: tauri-ui
        run: npm install

      # ── Validate CMake independently ────────────────────────
      - name: Validate CMake configuration
        run: cmake -B cmake-validate -DCMAKE_BUILD_TYPE=Release .

      # ── Build core Rust + C++ library ───────────────────────
      - name: Build workspace (release)
        run: cargo build --workspace --release

      # ── Run tests ───────────────────────────────────────────
      - name: Run tests
        run: cargo test --workspace --release

      # ── Build Tauri application ─────────────────────────────
      - name: Build Tauri application
        working-directory: tauri-ui
        run: npx tauri build
        env:
          CI: true

      # ── Verify static linking (Linux) ──────────────────────
      - name: Verify static linking
        if: runner.os == 'Linux'
        run: |
          if ldd target/release/joduga-tauri 2>/dev/null | grep -q libjoduga_audio; then
            echo "ERROR: binary dynamically links libjoduga_audio"
            exit 1
          fi
          echo "OK: libjoduga_audio is statically linked"

      # ── Upload build artifacts ──────────────────────────────
      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: joduga-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: joduga-macos
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: joduga-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: warn
