name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────
  # Cross-platform release builds
  # ─────────────────────────────────────────────────────────────
  build:
    name: Release Build (${{ matrix.os }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: joduga-linux
            asset_glob: |
              target/release/bundle/deb/*.deb
              target/release/bundle/rpm/*.rpm
              target/release/bundle/appimage/*.AppImage
          - os: macos-latest
            artifact_name: joduga-macos
            asset_glob: |
              target/release/bundle/dmg/*.dmg
          - os: windows-latest
            artifact_name: joduga-windows
            asset_glob: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-cargo-

      # ── Linux dependencies ──────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake g++ pkg-config \
            libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev libsecret-1-dev

      # ── macOS dependencies ──────────────────────────────────
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake

      # ── Node.js ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: tauri-ui
        run: npm install

      # ── Build ───────────────────────────────────────────────
      - name: Build workspace
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace --release

      - name: Build Tauri application
        working-directory: tauri-ui
        run: npx tauri build
        env:
          CI: true

      # ── Verify (Linux) ─────────────────────────────────────
      - name: Verify static linking
        if: runner.os == 'Linux'
        run: |
          if ldd target/release/joduga-tauri 2>/dev/null | grep -q libjoduga_audio; then
            echo "ERROR: binary dynamically links libjoduga_audio"
            exit 1
          fi

      # ── Upload artifacts ────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_glob }}
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # Create GitHub Release & attach artifacts
  # ─────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
          generate_release_notes: true
          files: |
            artifacts/joduga-linux/**/*
            artifacts/joduga-macos/**/*
            artifacts/joduga-windows/**/*
